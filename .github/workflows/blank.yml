name: Convert YAML Detection Rules to JSON

on:
  push:
    paths:
      - '**/*.yml'
      - '**/*.yaml'
  workflow_dispatch:

jobs:
  yaml-to-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install yamljs
        run: npm install -g yamljs

      - name: Convert YAML files to JSON
        run: |
          find . -type f \( -name "*.yml" -o -name "*.yaml" \) | while read file; do
            json_file="${file%.*}.json"
            yaml2json "$file" > "$json_file"
          done

      - name: Commit and push JSON files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-convert YAML detection rules to JSON"
          file_pattern: '**/*.json'
