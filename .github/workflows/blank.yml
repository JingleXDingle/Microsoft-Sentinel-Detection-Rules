name: Convert YAML Detection Rules to JSON

on:
  push:
    paths:
      - '**/*.yml'
      - '**/*.yaml'
  workflow_dispatch:

jobs:
  yaml-to-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install yamljs
        run: npm install -g yamljs

      - name: Convert only changed YAML files to JSON
        run: |
          git fetch origin ${{ github.base_ref || 'main' }}
          git diff --name-only origin/${{ github.base_ref || 'main' }} | grep -E '\.ya?ml$' | while read file; do
            [ -f "$file" ] || continue
            json_file="${file%.*}.json"
            yaml2json "$file" | jq '.' > "$json_file"
          done

      - name: Commit and push JSON files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-convert YAML detection rules to JSON"
          file_pattern: '**/*.json'
