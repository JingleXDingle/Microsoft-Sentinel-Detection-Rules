name: Convert YAML Detection Rules to JSON

on:
  push:
    paths:
      - '**/Detections/**/*.yml'
      - '**/Detections/**/*.yaml'
      - '**/Resources/**/*.yml'
      - '**/Resources/**/*.yaml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  yaml-to-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup tools
        run: |
          npm install -g yamljs
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Debug tree
        run: |
          echo "Repo tree around Detections:"
          ls -la
          find . -maxdepth 3 -type d -name "Detections" -print

      - name: Convert YAML files to JSON
        shell: bash
        run: |
          set -euo pipefail

          # Find YAML files anywhere whose path includes /Detections/ or /Resources/
          mapfile -d '' files < <(find . -type f \( -name "*.yml" -o -name "*.yaml" \) \
            \( -path "*/Detections/*" -o -path "*/Resources/*" \) -print0)

          echo "Found ${#files[@]} YAML file(s)."
          if (( ${#files[@]} == 0 )); then
            echo "Nothing to convert."
            exit 0
          fi

          printf 'Converting:\n - %s\n' "${files[@]}"
          for file in "${files[@]}"; do
            json_file="${file%.*}.json"
            mkdir -p "$(dirname "$json_file")"
            yaml2json "$file" | jq '.' > "$json_file"
          done

      - name: Commit and push JSON files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-convert YAML detection rules to JSON"
          file_pattern: '**/*.json'
          add_options: '-A -f'   # Force add even if ignored