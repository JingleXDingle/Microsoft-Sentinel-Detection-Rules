name: Convert JSON Detection File at Detections Folder to YAML # This workflow converts JSON detection files in the Detections folder to YAML format only if the YAML does not already exist.

on:
  push:
    paths: # This workflow triggers on changes to JSON files in the Detections folder.
      - 'Detections/**/*.json'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  json-to-yaml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Debug tree
        run: |
          echo "Repo tree around Detections:"
          ls -la
          find . -maxdepth 3 -type d -name "Detections" -print

      - name: Convert JSON files to YAML if YAML does not exist
        shell: bash
        run: |
          set -euo pipefail

          python3 << 'PYEOF'
          import os
          import json
          import yaml
          import glob

          # Find all JSON files under Detections recursively
          json_files = glob.glob('./Detections/**/*.json', recursive=True)

          print(f"Found {len(json_files)} JSON file(s).")

          if not json_files:
              print("Nothing to convert.")
              exit(0)

          converted = 0
          skipped = 0

          for json_path in sorted(json_files):
              yaml_path = os.path.splitext(json_path)[0] + '.yml'

              # Only convert if YAML counterpart does not already exist
              if os.path.exists(yaml_path):
                  print(f"Skipping (YAML already exists): {yaml_path}")
                  skipped += 1
                  continue

              with open(json_path, 'r', encoding='utf-8') as f:
                  data = json.load(f)

              with open(yaml_path, 'w', encoding='utf-8') as f:
                  yaml.dump(
                      data,
                      f,
                      allow_unicode=True,
                      default_flow_style=False,
                      sort_keys=False,
                      indent=2,
                      width=120
                  )

              print(f"Wrote: {yaml_path}")
              converted += 1

          print(f"\nSummary: {converted} converted, {skipped} skipped (YAML already existed).")
          PYEOF

      - name: Commit and push YAML files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-converted respective JSON detection rule to YAML"
          file_pattern: "**/**/*.yml"