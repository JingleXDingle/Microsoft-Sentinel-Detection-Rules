name: Validate Detection Rule Schema

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'Detections/**/*.yml'
      - 'Detections/**/*.yaml'
      - 'Detections/**/*.json'

  pull_request:
    branches:
      - main


  workflow_dispatch:

jobs:
  validate-schema:
    name: Validate Detection Rules Against Schema
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install jsonschema pyyaml

      - name: Run schema validation
        run: |
          python Validation_Scripts/Schema_Validation.py

      - name: Validation passed
        if: success()
        run: echo "All detection rules passed schema validation."